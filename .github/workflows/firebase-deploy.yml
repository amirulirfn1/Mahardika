name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy_hosting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: react-pwa/package-lock.json
      
      - name: Install dependencies
        working-directory: ./react-pwa
        run: npm ci --legacy-peer-deps
      
      - name: Run ESLint
        working-directory: ./react-pwa
        run: npm run lint --if-present

      - name: Run tests
        working-directory: ./react-pwa
        run: |
          npm run test -- --watchAll=false --passWithNoTests

      - name: Build
        working-directory: ./react-pwa
        env:
          CI: false # Prevents treating warnings as errors
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_MAHARDIKA_59EEE }}'
          channelId: live
          projectId: mahardika-59eee
          entryPoint: './react-pwa'
