name: Build and Deploy to Firebase
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: react-pwa/package-lock.json

      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: react-pwa/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('react-pwa/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        working-directory: ./react-pwa
        run: npm ci --prefer-offline --no-audit

      - name: Build React app
        working-directory: ./react-pwa
        env:
          CI: false # Prevents treating warnings as errors
        run: npm run build
        
      - name: Cache build output
        uses: actions/cache@v3
        with:
          path: react-pwa/build
          key: ${{ runner.os }}-build-${{ github.sha }}

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_MAHARDIKA }}'
          channelId: live
          projectId: mahardika-59eee
          entryPoint: ./react-pwa
