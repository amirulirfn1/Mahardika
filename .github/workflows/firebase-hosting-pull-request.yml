name: Deploy to Firebase Hosting on PR

on: 
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

env:
  WORKING_DIRECTORY: ./react-pwa

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  build_and_preview:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          cache: 'npm'
          
      - name: Verify working directory
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: pwd && ls -la
          
      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          npm ci --legacy-peer-deps
          npm install -g firebase-tools
          
      - name: Run tests
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          npm run test -- --watchAll=false --passWithNoTests
          # If you want to add tests later, create them in the __tests__ directory
          
      - name: Build
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          npm run build
          
      - name: Deploy to Firebase (Preview)
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          firebase hosting:channel:deploy pr-${{ github.event.number }} \
            --expires 7d \
            --token "${{ secrets.FIREBASE_TOKEN }}" \
            --only hosting \
            --json | \
            tee firebase-deploy-output.json
            
          # Extract the preview URL from the Firebase output
          PREVIEW_URL=$(jq -r '.result .hosting_url' < firebase-deploy-output.json)
          
          # Add a comment to the PR with the preview URL
          if [ -n "$PREVIEW_URL" ] && [ "$PREVIEW_URL" != "null" ]; then
            gh pr comment ${{ github.event.pull_request.number }} \
              --body "✅ Firebase Preview available at: $PREVIEW_URL"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
          FIREBASE_CLI_PREVIEWS: hostingchannels
          
      - name: Verify deployment
        if: always()
        run: |
          echo "Preview deployment completed with status: ${{ job.status }}"
