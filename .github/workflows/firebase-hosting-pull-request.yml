# Workflow file refreshed to fix 'on:' event trigger error
name: Deploy to Firebase Hosting on PR

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  build_and_preview:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: react-pwa/package-lock.json
          
      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: react-pwa/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('react-pwa/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
            
      - name: Install dependencies
        working-directory: ./react-pwa
        run: npm ci --prefer-offline --no-audit
        
      - name: Run ESLint
        working-directory: ./react-pwa
        run: npm run lint --if-present
        
      - name: Run tests
        working-directory: ./react-pwa
        run: |
          npm run test -- --watchAll=false --passWithNoTests
        
      - name: Build React app
        working-directory: ./react-pwa
        env:
          CI: false # Prevents treating warnings as errors
        run: npm run build
          
      - name: Deploy preview to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          # Using a more generic name for the Firebase secret
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_MAHARDIKA_59EEE }}'
          projectId: mahardika-59eee
          entryPoint: ./react-pwa
      
      - name: Verify deployment
        if: always()
        run: |
          echo "Preview deployment completed with status: ${{ job.status }}"
