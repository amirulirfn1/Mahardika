<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In - Mahardika</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Arial", sans-serif;
        background-color: #ffffff;
        color: #000000;
        line-height: 1.6;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
      }

      header {
        background-color: #000000;
        color: #ffffff;
        padding: 1rem 0;
        position: fixed;
        width: 100%;
        top: 0;
        z-index: 1000;
      }

      .header-content {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        font-size: 1.5rem;
        font-weight: bold;
      }

      .logo a {
        color: #ffffff;
        text-decoration: none;
      }

      nav a {
        color: #ffffff;
        text-decoration: none;
        margin-left: 2rem;
        transition: opacity 0.3s;
      }

      nav a:hover {
        opacity: 0.7;
      }

      main {
        flex: 1;
        margin-top: 80px;
        padding: 4rem 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .signin-container {
        background-color: #ffffff;
        border: 2px solid #000000;
        padding: 3rem;
        max-width: 400px;
        width: 100%;
      }

      .signin-header {
        text-align: center;
        margin-bottom: 2rem;
      }

      .signin-header h1 {
        font-size: 2rem;
        margin-bottom: 0.5rem;
        font-weight: 300;
      }

      .signin-header p {
        opacity: 0.7;
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
      }

      input[type="email"],
      input[type="password"] {
        width: 100%;
        padding: 12px;
        border: 1px solid #000000;
        background-color: #ffffff;
        color: #000000;
        font-size: 1rem;
        transition: border-color 0.3s;
      }

      input[type="email"]:focus,
      input[type="password"]:focus {
        outline: none;
        border-color: #666666;
      }

      .form-options {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
        font-size: 0.9rem;
      }

      .checkbox-group {
        display: flex;
        align-items: center;
      }

      .checkbox-group input[type="checkbox"] {
        margin-right: 0.5rem;
      }

      .forgot-password {
        color: #000000;
        text-decoration: none;
        transition: opacity 0.3s;
      }

      .forgot-password:hover {
        opacity: 0.7;
      }

      .btn {
        width: 100%;
        padding: 12px;
        background-color: #000000;
        color: #ffffff;
        border: 2px solid #000000;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s;
        text-decoration: none;
        display: inline-block;
        text-align: center;
      }

      .btn:hover {
        background-color: #ffffff;
        color: #000000;
      }

      .divider {
        text-align: center;
        margin: 2rem 0;
        position: relative;
      }

      .divider::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 1px;
        background-color: #000000;
      }

      .divider span {
        background-color: #ffffff;
        padding: 0 1rem;
      }

      .btn-google {
        background-color: #ffffff;
        color: #000000;
        border: 1px solid #000000;
        margin-bottom: 1rem;
      }

      .btn-google:hover {
        background-color: #000000;
        color: #ffffff;
      }

      .signin-footer {
        text-align: center;
        margin-top: 2rem;
        padding-top: 2rem;
        border-top: 1px solid #000000;
      }

      .signin-footer a {
        color: #000000;
        text-decoration: none;
        font-weight: 500;
      }

      .signin-footer a:hover {
        opacity: 0.7;
      }

      @media (max-width: 768px) {
        .signin-container {
          padding: 2rem;
          margin: 1rem;
        }

        .form-options {
          flex-direction: column;
          gap: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="container">
        <div class="header-content">
          <div class="logo">
            <a href="index.html">MAHARDIKA</a>
          </div>
          <nav>
            <a href="index.html">Home</a>
            <a href="signup.html">Sign Up</a>
          </nav>
        </div>
      </div>
    </header>

    <main>
      <div class="signin-container">
        <div class="signin-header">
          <h1>Sign In</h1>
          <p>Access your insurance dashboard</p>
        </div>

        <form>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required />
          </div>

          <div class="form-options">
            <div class="checkbox-group">
              <input type="checkbox" id="remember" name="remember" />
              <label for="remember">Remember me</label>
            </div>
            <a href="#" class="forgot-password">Forgot password?</a>
          </div>

          <button type="submit" class="btn">Sign In</button>
        </form>

        <div class="divider">
          <span>or</span>
        </div>

        <button class="btn btn-google">Continue with Google</button>

        <div class="signin-footer">
          <p>Don't have an account? <a href="signup.html">Sign up here</a></p>
        </div>
      </div>
    </main>
  </body>
</html>
