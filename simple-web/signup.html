<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - Mahardika</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Arial", sans-serif;
        background-color: #ffffff;
        color: #000000;
        line-height: 1.6;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
      }

      header {
        background-color: #000000;
        color: #ffffff;
        padding: 1rem 0;
        position: fixed;
        width: 100%;
        top: 0;
        z-index: 1000;
      }

      .header-content {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        font-size: 1.5rem;
        font-weight: bold;
      }

      .logo a {
        color: #ffffff;
        text-decoration: none;
      }

      nav a {
        color: #ffffff;
        text-decoration: none;
        margin-left: 2rem;
        transition: opacity 0.3s;
      }

      nav a:hover {
        opacity: 0.7;
      }

      main {
        flex: 1;
        margin-top: 80px;
        padding: 4rem 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .signup-container {
        background-color: #ffffff;
        border: 2px solid #000000;
        padding: 3rem;
        max-width: 500px;
        width: 100%;
      }

      .signup-header {
        text-align: center;
        margin-bottom: 2rem;
      }

      .signup-header h1 {
        font-size: 2rem;
        margin-bottom: 0.5rem;
        font-weight: 300;
      }

      .signup-header p {
        opacity: 0.7;
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      .form-group.full-width {
        grid-column: 1 / -1;
      }

      label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
      }

      input[type="text"],
      input[type="email"],
      input[type="password"],
      input[type="tel"],
      select {
        width: 100%;
        padding: 12px;
        border: 1px solid #000000;
        background-color: #ffffff;
        color: #000000;
        font-size: 1rem;
        transition: border-color 0.3s;
      }

      input:focus,
      select:focus {
        outline: none;
        border-color: #666666;
      }

      select {
        cursor: pointer;
      }

      .checkbox-group {
        display: flex;
        align-items: flex-start;
        margin-bottom: 2rem;
      }

      .checkbox-group input[type="checkbox"] {
        margin-right: 0.5rem;
        margin-top: 0.2rem;
      }

      .checkbox-group label {
        font-size: 0.9rem;
        font-weight: normal;
        margin-bottom: 0;
      }

      .checkbox-group a {
        color: #000000;
        text-decoration: none;
      }

      .checkbox-group a:hover {
        opacity: 0.7;
      }

      .btn {
        width: 100%;
        padding: 12px;
        background-color: #000000;
        color: #ffffff;
        border: 2px solid #000000;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s;
        text-decoration: none;
        display: inline-block;
        text-align: center;
      }

      .btn:hover {
        background-color: #ffffff;
        color: #000000;
      }

      .divider {
        text-align: center;
        margin: 2rem 0;
        position: relative;
      }

      .divider::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 1px;
        background-color: #000000;
      }

      .divider span {
        background-color: #ffffff;
        padding: 0 1rem;
      }

      .btn-google {
        background-color: #ffffff;
        color: #000000;
        border: 1px solid #000000;
        margin-bottom: 1rem;
      }

      .btn-google:hover {
        background-color: #000000;
        color: #ffffff;
      }

      .signup-footer {
        text-align: center;
        margin-top: 2rem;
        padding-top: 2rem;
        border-top: 1px solid #000000;
      }

      .signup-footer a {
        color: #000000;
        text-decoration: none;
        font-weight: 500;
      }

      .signup-footer a:hover {
        opacity: 0.7;
      }

      @media (max-width: 768px) {
        .signup-container {
          padding: 2rem;
          margin: 1rem;
        }

        .form-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="container">
        <div class="header-content">
          <div class="logo">
            <a href="index.html">MAHARDIKA</a>
          </div>
          <nav>
            <a href="index.html">Home</a>
            <a href="signin.html">Sign In</a>
          </nav>
        </div>
      </div>
    </header>

    <main>
      <div class="signup-container">
        <div class="signup-header">
          <h1>Create Account</h1>
          <p>Join our insurance platform today</p>
        </div>

        <form>
          <div class="form-row">
            <div class="form-group">
              <label for="firstName">First Name</label>
              <input type="text" id="firstName" name="firstName" required />
            </div>
            <div class="form-group">
              <label for="lastName">Last Name</label>
              <input type="text" id="lastName" name="lastName" required />
            </div>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required />
          </div>

          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" required />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" id="password" name="password" required />
            </div>
            <div class="form-group">
              <label for="confirmPassword">Confirm Password</label>
              <input
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label for="role">Account Type</label>
            <select id="role" name="role" required>
              <option value="">Select account type</option>
              <option value="customer">Customer</option>
              <option value="agent">Insurance Agent</option>
              <option value="admin">Administrator</option>
            </select>
          </div>

          <div class="checkbox-group">
            <input type="checkbox" id="terms" name="terms" required />
            <label for="terms">
              I agree to the <a href="#">Terms of Service</a> and
              <a href="#">Privacy Policy</a>
            </label>
          </div>

          <div class="checkbox-group">
            <input type="checkbox" id="newsletter" name="newsletter" />
            <label for="newsletter">
              I would like to receive updates and newsletters about insurance
              products
            </label>
          </div>

          <button type="submit" class="btn">Create Account</button>
        </form>

        <div class="divider">
          <span>or</span>
        </div>

        <button class="btn btn-google">Sign up with Google</button>

        <div class="signup-footer">
          <p>Already have an account? <a href="signin.html">Sign in here</a></p>
        </div>
      </div>
    </main>
  </body>
</html>
